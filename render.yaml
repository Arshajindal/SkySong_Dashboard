services:
  - type: web
    name: skysong-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "run:app" --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
